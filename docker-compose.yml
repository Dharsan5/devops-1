version: '3.9'

services:

  # ── App ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
    container_name: chat-backend
    restart: unless-stopped
    env_file: ./backend/.env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "5000:5000"
    networks:
      - chat-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: http://localhost:5000
    container_name: chat-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chat-net

  # ── Monitoring ────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: crow-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    networks:
      - chat-net
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: crow-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: crow123
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/provisioning/dashboards/crow-chat.json
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - chat-net
    depends_on:
      - prometheus

networks:
  chat-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
